<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yolo — AI Agent</title>

  <!-- Fonts: Playfair Display for headings, DM Sans for body, JetBrains Mono for code -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Markdown + Code highlighting via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Motion library for animations -->
  <script src="https://cdn.jsdelivr.net/npm/motion@11.11.13/dist/motion.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- ═══════════════ MAIN CHAT AREA ═══════════════ -->
    <main id="chat-area">
      <!-- Connection status bar -->
      <div id="status-bar" class="status-bar status-connecting">
        <div class="status-dot"></div>
        <span id="status-text">Connecting to Yolo agent...</span>
      </div>

      <!-- Chat header -->
      <div id="chat-header">
        <div class="logo-wrapper">
          <div class="logo-icon">Y</div>
          <span class="logo-text">Yolo</span>
        </div>
        <div class="chat-header-info" style="margin-left: 12px; border-left: 1px solid var(--border); padding-left: 12px;">
          <h2 id="chat-title">New Conversation</h2>
          <span id="chat-subtitle" class="chat-subtitle">Yolo AI Agent</span>
        </div>
        <div class="chat-header-actions">
          <button id="mode-toggle" class="icon-btn" title="Toggle YOLO mode">
            <span class="mode-label">Safe</span>
          </button>
          <button id="workers-toggle-btn" class="icon-btn" title="View Workers">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          </button>
          <button id="settings-btn" class="icon-btn" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </div>

      <!-- Messages container -->
      <div id="messages-container">
        <div id="messages" class="messages">
          <!-- Welcome state -->
          <div id="welcome-screen" class="welcome-screen">
            <div class="welcome-icon">
              <div class="welcome-glow"></div>
              <span>Y</span>
            </div>
            <h1>Welcome to Yolo</h1>
            <p>Your autonomous AI agent. Ask anything — code, research, system control, and more.</p>
            <div class="quick-actions">
              <button class="quick-action" data-prompt="Help me write a Python script">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>
                Write Code
              </button>
              <button class="quick-action" data-prompt="Search the web for the latest AI news">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                Web Search
              </button>
              <button class="quick-action" data-prompt="Analyze the files in my current project">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Analyze Files
              </button>
              <button class="quick-action" data-prompt="What can you do?">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                Capabilities
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div id="input-area">
        <div class="input-wrapper">
          <button id="attach-btn" class="input-icon-btn" title="Attach file">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <textarea id="message-input" placeholder="Type a message..." rows="1" autofocus></textarea>
          <button id="send-btn" title="Send message" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</span>
        </div>
      </div>
    </main>

    <!-- ═══════════════ SETTINGS MODAL ═══════════════ -->
    <div id="settings-modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h2>Settings</h2>
          <button id="close-settings" class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label class="setting-label">User ID</label>
            <input id="setting-user-id" type="number" value="1" min="1" class="setting-input" />
          </div>
          <div class="setting-group">
            <label class="setting-label">Agent Mode</label>
            <select id="setting-mode" class="setting-input">
              <option value="safe">Safe (HITL confirmations)</option>
              <option value="yolo">YOLO (autonomous)</option>
            </select>
          </div>
          <div class="setting-group">
            <label class="setting-label">Theme</label>
            <select id="setting-theme" class="setting-input">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <!-- ═══════════════ WORKERS PANEL ═══════════════ -->
    <div id="workers-panel" class="workers-panel hidden">
      <div class="workers-header">
        <h2>Background Workers</h2>
        <button id="close-workers" class="icon-btn" title="Close workers">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="workers-content" class="workers-body">
        <!-- Default list view -->
        <div id="workers-list-view">
          <div id="workers-list" class="workers-list"></div>
        </div>
        <!-- Drilldown chat view -->
        <div id="worker-chat-view" class="hidden">
          <div class="worker-chat-header">
            <button id="back-to-workers" class="back-btn icon-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <span class="worker-chat-title" id="worker-chat-title">Task ID</span>
          </div>
          <div id="worker-chat-messages" class="messages worker-messages"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
