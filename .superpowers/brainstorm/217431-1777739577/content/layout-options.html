<h2>Dynamic Widget Placement Options</h2>
<p class="subtitle">Where should the interactive widget expand from?</p>

<div class="split" style="gap: 30px;">
  
  <!-- Option A -->
  <div class="mockup" style="flex: 1; display: flex; flex-direction: column;">
    <div class="mockup-header">Option A: Floating Above Input</div>
    <div class="mockup-body" style="background: #111; padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; height: 300px; position: relative;">
      
      <!-- Fake chat messages -->
      <div style="color: #888; font-size: 12px; margin-bottom: auto;">... chat history ...</div>
      
      <!-- Floating Widget -->
      <div style="background: #222; border: 1px solid #444; border-radius: 8px; padding: 15px; margin-bottom: 10px; width: 100%; box-shadow: 0 -4px 15px rgba(0,0,0,0.5);">
        <div style="color: #fff; font-weight: bold; margin-bottom: 10px;">Which option do you prefer?</div>
        <button style="display: block; width: 100%; background: #333; color: white; border: 1px solid #555; padding: 8px; margin-bottom: 5px; text-align: left; border-radius: 4px;">Option A</button>
        <button style="display: block; width: 100%; background: #333; color: white; border: 1px solid #555; padding: 8px; text-align: left; border-radius: 4px;">Option B</button>
      </div>

      <!-- Textbar -->
      <div style="background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 10px 15px; color: #888; display: flex; align-items: center;">
        <span style="margin-right: 10px;">+</span>
        <span>Type a message...</span>
      </div>
    </div>
  </div>

  <!-- Option B -->
  <div class="mockup" style="flex: 1; display: flex; flex-direction: column;">
    <div class="mockup-header">Option B: Replacing the Textbar</div>
    <div class="mockup-body" style="background: #111; padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; height: 300px;">
      
      <!-- Fake chat messages -->
      <div style="color: #888; font-size: 12px; margin-bottom: auto;">... chat history ...</div>
      
      <!-- Replaced Input Widget -->
      <div style="background: #1a1a1a; border: 1px solid #444; border-radius: 12px; padding: 15px; width: 100%;">
        <div style="color: #fff; font-weight: bold; margin-bottom: 10px;">Which option do you prefer?</div>
        <button style="display: block; width: 100%; background: #333; color: white; border: 1px solid #555; padding: 8px; margin-bottom: 5px; text-align: left; border-radius: 4px;">Option A</button>
        <button style="display: block; width: 100%; background: #333; color: white; border: 1px solid #555; padding: 8px; text-align: left; border-radius: 4px;">Option B</button>
        <div style="color: #666; font-size: 11px; text-align: center; margin-top: 10px; cursor: pointer;">Cancel (Return to keyboard)</div>
      </div>
    </div>
  </div>

</div>
